<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐳 DevOps Learning Path</title>
<meta name="description" content="A structured, project-based DevOps curriculum — learn Docker, containers and cloud-native deploys interactively." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐳</text></svg>" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel-2: #1c2330; --border: #2a323d;
    --text: #e6edf3; --muted: #8b949e; --accent: #2f9bff; --accent-2: #1f6feb;
    --green: #2ea043; --sidebar-w: 320px;
  }
  [data-theme="light"] {
    --bg: #ffffff; --panel: #f6f8fa; --panel-2: #eef1f5; --border: #d8dee4;
    --text: #1f2328; --muted: #656d76; --accent: #0969da; --accent-2: #0860ca; --green: #1a7f37;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); display: flex; min-height: 100vh;
  }
  a { color: var(--accent); }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: var(--sidebar-w); flex: 0 0 var(--sidebar-w); background: var(--panel);
    border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0;
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .brand { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); }
  .brand h1 { font-size: 1.15rem; margin: 0 0 4px; }
  .brand p { font-size: .78rem; color: var(--muted); margin: 0; line-height: 1.4; }
  .focus { display: inline-block; margin-top: 10px; font-size: .68rem; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px; }

  .progress-wrap { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .progress-label { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { height: 7px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--green), var(--accent)); transition: width .35s ease; }

  nav { padding: 8px 10px 24px; flex: 1; }
  .proj-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
    padding: 14px 12px 6px; font-weight: 700; }
  .lesson {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px;
    cursor: pointer; font-size: .86rem; color: var(--text); border: 1px solid transparent; line-height: 1.3;
  }
  .lesson:hover { background: var(--panel-2); }
  .lesson.active { background: var(--accent-2); color: #fff; }
  .lesson.active .step { color: #fff; }
  .lesson .step { font-variant-numeric: tabular-nums; font-size: .72rem; color: var(--muted); min-width: 18px; }
  .lesson .tick {
    margin-left: auto; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border);
    flex: 0 0 18px; display: grid; place-items: center; font-size: .7rem; color: transparent;
  }
  .lesson.done .tick { background: var(--green); border-color: var(--green); color: #fff; }
  .lesson.active .tick { border-color: rgba(255,255,255,.6); }
  .opt-tag { font-size: .62rem; color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }

  /* ---------- Main ---------- */
  #main { flex: 1; min-width: 0; height: 100vh; overflow-y: auto; }
  .topbar { position: sticky; top: 0; z-index: 5; background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; padding: 10px 28px; }
  .topbar .crumb { font-size: .8rem; color: var(--muted); flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn { background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; font-size: .82rem; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
  .icon-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px;
    width: 36px; height: 34px; cursor: pointer; font-size: 1rem; color: var(--text); }
  #menu-toggle { display: none; }

  .content { max-width: 860px; margin: 0 auto; padding: 32px 28px 96px; }
  .content h1 { font-size: 1.9rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .content h2 { font-size: 1.35rem; margin-top: 1.9em; }
  .content h3 { font-size: 1.08rem; margin-top: 1.5em; }
  .content p, .content li { line-height: 1.7; }
  .content code { background: var(--panel-2); padding: 2px 6px; border-radius: 5px;
    font-family: "SF Mono", ui-monospace, Consolas, monospace; font-size: .88em; }
  .content pre { background: #0b1220; border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; overflow-x: auto; font-size: .85rem; }
  [data-theme="light"] .content pre { background: #f6f8fa; }
  .content pre code { background: none; padding: 0; font-size: .85rem; }
  .content table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: .9rem; }
  .content th, .content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .content th { background: var(--panel-2); }
  .content blockquote { border-left: 4px solid var(--accent); margin: 1em 0; padding: 6px 16px;
    background: var(--panel); border-radius: 0 8px 8px 0; color: var(--text); }
  .content ul.task-list { list-style: none; padding-left: 4px; }
  .content ul.task-list li { display: flex; align-items: flex-start; gap: 9px; padding: 3px 0; }
  .content ul.task-list input { width: 17px; height: 17px; margin-top: 3px; cursor: pointer; accent-color: var(--green); }

  .lesson-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-top: 48px; padding-top: 22px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .home-hero { text-align: center; padding: 48px 12px 8px; }
  .home-hero .big { font-size: 3rem; }
  .card-grid { display: grid; gap: 16px; margin-top: 28px; }
  .pcard { border: 1px solid var(--border); border-radius: 14px; padding: 20px; background: var(--panel);
    cursor: pointer; transition: transform .12s ease, border-color .12s ease; }
  .pcard:hover { transform: translateY(-2px); border-color: var(--accent); }
  .pcard h3 { margin: 0 0 6px; }
  .pcard .meta { font-size: .76rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .pill { border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; }

  .loading { color: var(--muted); padding: 40px 0; text-align: center; }

  @media (max-width: 820px) {
    #menu-toggle { display: inline-block; }
    #sidebar { position: fixed; z-index: 20; transform: translateX(-100%); transition: transform .22s ease; }
    #sidebar.open { transform: translateX(0); }
    .content { padding: 22px 18px 80px; }
    #backdrop.show { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 15; }
  }
</style>
</head>
<body>
<aside id="sidebar">
  <div class="brand">
    <h1>🐳 DevOps Learning Path</h1>
    <p id="brand-sub"></p>
    <span class="focus" id="brand-focus"></span>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Your progress</span><span id="progress-text">0 / 0</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <nav id="nav"></nav>
</aside>
<div id="backdrop"></div>

<main id="main">
  <div class="topbar">
    <button class="icon-btn" id="menu-toggle" aria-label="Menu">☰</button>
    <span class="crumb" id="crumb">Home</span>
    <button class="icon-btn" id="theme-toggle" title="Toggle theme">🌙</button>
    <a class="btn" id="gh-link" href="#" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
  <div class="content" id="content"><div class="loading">Loading curriculum…</div></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const GH_REPO = "https://github.com/PuvaanRaaj/learn-devops-with-ai";
const STORE_KEY = "devops-path-progress-v1";
let curriculum = null;
let flatLessons = []; // {projId, projName, lesson, key}

const store = {
  data: JSON.parse(localStorage.getItem(STORE_KEY) || "{}"),
  get(key) { return this.data[key]; },
  set(key, val) { this.data[key] = val; localStorage.setItem(STORE_KEY, JSON.stringify(this.data)); },
};

const $ = (id) => document.getElementById(id);

async function boot() {
  $("gh-link").href = GH_REPO;
  try {
    const res = await fetch("curriculum.json", { cache: "no-cache" });
    curriculum = await res.json();
  } catch (e) {
    $("content").innerHTML = `<div class="loading">Could not load <code>curriculum.json</code>.<br>Run this from a web server (not a <code>file://</code> path).</div>`;
    return;
  }
  $("brand-sub").textContent = curriculum.subtitle || "";
  $("brand-focus").textContent = curriculum.focus || "";

  flatLessons = [];
  curriculum.projects.forEach(p =>
    p.lessons.forEach(l => flatLessons.push({
      projId: p.id, projName: `${p.emoji || ""} Project ${p.number} — ${p.name}`.trim(),
      lesson: l, key: `${p.id}/${l.file}`,
    }))
  );

  buildNav();
  updateProgress();
  marked.setOptions({
    highlight: (code, lang) => {
      try { return hljs.getLanguage(lang) ? hljs.highlight(code, { language: lang }).value : hljs.highlightAuto(code).value; }
      catch { return code; }
    },
  });
  window.addEventListener("hashchange", route);
  route();
  initTheme();
}

function buildNav() {
  const nav = $("nav");
  nav.innerHTML = "";
  const home = document.createElement("div");
  home.className = "lesson";
  home.innerHTML = `<span class="step">⌂</span><span>Home / Overview</span>`;
  home.onclick = () => { location.hash = ""; };
  nav.appendChild(home);

  curriculum.projects.forEach(p => {
    const t = document.createElement("div");
    t.className = "proj-title";
    t.textContent = `Project ${p.number}: ${p.name}`;
    nav.appendChild(t);
    p.lessons.forEach(l => {
      const key = `${p.id}/${l.file}`;
      const el = document.createElement("div");
      el.className = "lesson" + (store.get(key)?.done ? " done" : "");
      el.dataset.key = key;
      el.innerHTML = `<span class="step">${l.step}</span>
        <span>${cleanTitle(l.title)} ${l.optional ? '<span class="opt-tag">opt</span>' : ''}</span>
        <span class="tick">✓</span>`;
      el.onclick = () => { location.hash = encodeURIComponent(key); closeSidebar(); };
      nav.appendChild(el);
    });
  });
}

function cleanTitle(t) { return t.replace(/^\[Optional\]\s*/i, ""); }

function setActive(key) {
  document.querySelectorAll(".lesson").forEach(e => e.classList.toggle("active", e.dataset.key === key));
}

function route() {
  const key = decodeURIComponent(location.hash.replace(/^#/, ""));
  if (!key) return renderHome();
  const item = flatLessons.find(f => f.key === key);
  if (!item) return renderHome();
  renderLesson(item);
}

function renderHome() {
  setActive(null);
  $("crumb").textContent = "Home";
  const c = curriculum;
  let html = `<div class="home-hero">
      <div class="big">🐳</div>
      <h1 style="border:none;display:inline-block;">DevOps Learning Path</h1>
      <p style="color:var(--muted);max-width:640px;margin:10px auto 0;line-height:1.7;">${c.subtitle}</p>
    </div>
    <div class="card-grid">`;
  c.projects.forEach(p => {
    const done = p.lessons.filter(l => store.get(`${p.id}/${l.file}`)?.done).length;
    html += `<div class="pcard" data-proj="${p.id}">
      <h3>${p.emoji || ""} Project ${p.number} — ${p.name}</h3>
      <p style="color:var(--muted);margin:.4em 0 0;line-height:1.6;">${p.overview || ""}</p>
      <div class="meta">
        <span class="pill">${p.difficulty}</span>
        <span class="pill">Hosting: ${p.hosting}</span>
        <span class="pill">${done}/${p.lessons.length} done</span>
      </div>
      <div style="font-size:.8rem;color:var(--muted);">${p.keySkills}</div>
    </div>`;
  });
  html += `</div>`;
  $("content").innerHTML = html;
  document.querySelectorAll(".pcard").forEach(card => {
    card.onclick = () => {
      const p = c.projects.find(x => x.id === card.dataset.proj);
      location.hash = encodeURIComponent(`${p.id}/${p.lessons[0].file}`);
    };
  });
}

async function renderLesson(item) {
  setActive(item.key);
  $("crumb").textContent = `${item.projName}  ›  ${item.lesson.step} ${cleanTitle(item.lesson.title)}`;
  $("content").innerHTML = `<div class="loading">Loading lesson…</div>`;
  let md;
  try {
    const res = await fetch(item.key, { cache: "no-cache" });
    md = await res.text();
  } catch {
    $("content").innerHTML = `<div class="loading">Could not load <code>${item.key}</code>.</div>`;
    return;
  }
  $("content").innerHTML = marked.parse(md) + lessonFooter(item);
  $("main").scrollTop = 0;
  wireTaskCheckboxes(item.key);
  wireFooter(item);
}

function lessonFooter(item) {
  const idx = flatLessons.findIndex(f => f.key === item.key);
  const prev = flatLessons[idx - 1], next = flatLessons[idx + 1];
  const done = store.get(item.key)?.done;
  return `<div class="lesson-foot">
    <button class="btn" id="prev-btn" ${prev ? "" : "disabled style='opacity:.4'"}>← Previous</button>
    <button class="btn primary" id="done-btn">${done ? "✓ Completed — undo" : "Mark lesson complete"}</button>
    <button class="btn" id="next-btn" ${next ? "" : "disabled style='opacity:.4'"}>Next →</button>
  </div>`;
}

function wireFooter(item) {
  const idx = flatLessons.findIndex(f => f.key === item.key);
  const prev = flatLessons[idx - 1], next = flatLessons[idx + 1];
  if (prev) $("prev-btn").onclick = () => location.hash = encodeURIComponent(prev.key);
  if (next) $("next-btn").onclick = () => location.hash = encodeURIComponent(next.key);
  $("done-btn").onclick = () => {
    const cur = store.get(item.key) || {};
    cur.done = !cur.done;
    store.set(item.key, cur);
    document.querySelector(`.lesson[data-key="${CSS.escape(item.key)}"]`)?.classList.toggle("done", cur.done);
    updateProgress();
    $("done-btn").textContent = cur.done ? "✓ Completed — undo" : "Mark lesson complete";
    if (cur.done && next) setTimeout(() => location.hash = encodeURIComponent(next.key), 250);
  };
}

function wireTaskCheckboxes(key) {
  const boxes = $("content").querySelectorAll("ul.task-list input[type=checkbox]");
  const saved = store.get(key)?.tasks || {};
  boxes.forEach((b, i) => {
    b.disabled = false;
    if (saved[i]) b.checked = true;
    b.onchange = () => {
      const cur = store.get(key) || {};
      cur.tasks = cur.tasks || {};
      cur.tasks[i] = b.checked;
      store.set(key, cur);
    };
  });
}

function updateProgress() {
  const total = flatLessons.length;
  const done = flatLessons.filter(f => store.get(f.key)?.done).length;
  $("progress-text").textContent = `${done} / ${total}`;
  $("progress-fill").style.width = total ? `${(done / total) * 100}%` : "0";
}

/* theme + mobile sidebar */
function initTheme() {
  const saved = localStorage.getItem("devops-theme") || "dark";
  document.documentElement.dataset.theme = saved === "light" ? "light" : "";
  $("theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
  $("theme-toggle").onclick = () => {
    const light = document.documentElement.dataset.theme !== "light";
    document.documentElement.dataset.theme = light ? "light" : "";
    localStorage.setItem("devops-theme", light ? "light" : "dark");
    $("theme-toggle").textContent = light ? "☀️" : "🌙";
  };
}
function closeSidebar() { $("sidebar").classList.remove("open"); $("backdrop").classList.remove("show"); }
$("menu-toggle").onclick = () => { $("sidebar").classList.toggle("open"); $("backdrop").classList.toggle("show"); };
$("backdrop").onclick = closeSidebar;

boot();
</script>
</body>
</html>
